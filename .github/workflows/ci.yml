name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run coverage
      - run: bun run crap
