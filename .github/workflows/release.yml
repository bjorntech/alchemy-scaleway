name: Release NPM Package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
          sed -i '/always-auth/d' ~/.npmrc 2>/dev/null || true

      - name: Run quality gates
        run: |
          bun run check
          bun test
          bun run coverage
          bun run crap

      - name: Publish to NPM
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "--- Publishing ${PKG_NAME}@${VERSION} ---"

          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${VERSION} already published, skipping"
            exit 0
          fi

          TAG="latest"

          bun pm pack --destination .
          TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          echo "Publishing tarball: ${TARBALL} with tag ${TAG}"
          npm publish "${TARBALL}" --access public --tag "${TAG}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "Adding prerelease dist-tag: next -> ${PKG_NAME}@${VERSION}"
            npm dist-tag add "${PKG_NAME}@${VERSION}" next || \
              echo "::warning::npm trusted publishing allowed publish but not dist-tag mutation; update the next tag manually or configure an npm automation token"
          fi
          rm -f *.tgz
          echo "--- Published ${PKG_NAME}@${VERSION} ---"
