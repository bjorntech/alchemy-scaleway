name: Bug Report
description: Report a reproducible bug in alchemy-scaleway
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real Scaleway credentials, Secret Manager values, or `.env` contents. Keep reports concise and specific.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or code needed to reproduce the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: alchemy-scaleway, alchemy, effect, Bun, and TypeScript versions.
      placeholder: alchemy-scaleway 0.1.2-beta.51, alchemy 2.0.0-beta.51, effect 4.0.0-beta.74
    validations:
      required: true
  - type: dropdown
    id: resource
    attributes:
      label: Resource Area
      options:
        - Namespace
        - Container
        - Trigger
        - Domain
        - RegistryNamespace
        - Secret
        - Bucket
        - Credentials/Auth
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Output
      description: Remove secrets before pasting logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets and live credentials from this report.
          required: true
        - label: This is a concrete reproducible issue, not an automated scanner report without impact.
          required: true
